# Edge reverse proxy — DEVELOPMENT. Plain HTTP on :80 (published to host :3000).
# Single public origin: serves the SPA (via the frontend container) and proxies
# /v1 to the backend. The browser only ever talks to this proxy.

server {
    listen 80;
    server_name _;

    # Match the backend's MAX_BODY_SIZE_BYTES.
    client_max_body_size 1m;

    # API — forwarded to the backend at its own paths (no rewrite), so the BFF
    # session cookie and the path-scoped oidc_state cookie stay aligned.
    location /v1/ {
        proxy_pass         http://app:8000;
        proxy_set_header   Host              $host;
        # This proxy is the trust boundary: OVERWRITE the client-IP headers with
        # the real peer so a client can't spoof them (the backend's per-IP
        # rate-limiter keys on X-Real-IP).
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Everything else — the SPA, served by the internal frontend container.
    location / {
        proxy_pass         http://frontend:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
