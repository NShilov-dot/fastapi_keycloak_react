# Edge reverse proxy — PRODUCTION. TLS-terminating single public origin.
#
# Certs: mount real certs at /etc/nginx/certs/{fullchain.pem,privkey.pem}
# (compose mounts ./nginx/certs). For local prod-testing: `make tls-dev-cert`.
# Set the public hostname via `server_name` below (or leave `_` to match any).

# HTTP -> HTTPS redirect.
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS at the edge (the backend also sets it in prod).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    client_max_body_size 1m;

    location /v1/ {
        proxy_pass         http://app:8000;
        proxy_set_header   Host              $host;
        # Trust boundary: overwrite client-IP headers with the real peer.
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto https;
    }

    location / {
        proxy_pass         http://frontend:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto https;
    }
}
