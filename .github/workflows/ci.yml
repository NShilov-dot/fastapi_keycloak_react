# CI for the template. On GitLab/other CI, mirror this with a single `make ci`
# step (backend gates + frontend typecheck) plus the frontend build.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync
      - name: Lint (ruff)
        run: uv run ruff check src tests
      - name: Type-check (mypy --strict, src)
        run: uv run mypy src
      - name: Tests (pytest; testcontainers uses the runner's Docker)
        run: uv run pytest -q
        env:
          PYTHONPATH: src

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Type-check + build
        run: npm run build
