# Base compose — shared service definitions for ALL environments.
# Never used alone; always combined with an overlay:
#   dev :  docker compose -f docker-compose.yml -f docker-compose.dev.yml  ...
#   prod:  docker compose -f docker-compose.yml -f docker-compose.prod.yml ...
# (the Makefile does this for you: `make up` = dev, `make up ENV=prod` = prod).
#
# Host port publishing, source mounts, the app target (dev/runtime), the Keycloak
# command, and Redis auth all live in the overlays — this file stays env-neutral.

name: saas

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
      POSTGRES_DB: keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    # `command` (start-dev vs start) + hostname/proxy settings come from the overlay.
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./backend/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # `command` (with/without requirepass) + healthcheck auth come from the overlay.
    volumes:
      - redis-data:/data
    restart: unless-stopped

  app:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
      # target (dev | runtime) is set by the overlay.
    environment:
      # Internal backchannel URLs (server -> service over the compose network).
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-app}
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/${KEYCLOAK_REALM:-saas}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: unless-stopped

  # SPA static server (internal). Fronted by the edge `nginx` — no host ports here.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - app
    restart: unless-stopped

  # Edge reverse proxy — the single public entry point. Serves the SPA (via
  # frontend) and proxies /v1 -> app on ONE origin. Config + published ports +
  # TLS come from the overlay (nginx/nginx.dev.conf vs nginx/nginx.prod.conf).
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - app
    restart: unless-stopped

volumes:
  postgres-data:
  keycloak-db-data:
  redis-data:
