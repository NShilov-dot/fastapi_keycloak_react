name: saas-backend

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      # Host 5433 to avoid colliding with other local Postgres instances; the app
      # reaches this DB over the docker network (postgres:5432), not the host port.
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # Host 6380 to avoid colliding with other local Redis instances; the app
      # reaches it over the docker network (redis:6379), not the host port.
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    # Single source of truth is the project-root .env (see Makefile). These
    # environment entries override the host-facing URLs with docker-network names.
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/app
      REDIS_URL: redis://redis:6379/0
      # Backchannel issuer (server -> Keycloak) uses the compose-network name…
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/saas
      # …while the browser-facing issuer (authorize/end_session + token `iss`) and
      # the BFF public base point at the single nginx origin / published Keycloak port.
      KEYCLOAK_PUBLIC_ISSUER: http://localhost:8080/realms/saas
      PUBLIC_BASE_URL: http://localhost:3000
      FRONTEND_BASE_URL: http://localhost:3000
    ports:
      # Host 8001 to avoid colliding with other local APIs; the browser reaches the
      # backend through nginx (:3000 -> app:8000 internal), not this host port.
      - "8001:8000"
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  postgres-data:
  keycloak-db-data:
  redis-data:
