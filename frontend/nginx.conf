server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Cap request bodies at the edge to match the backend's MAX_BODY_SIZE_BYTES.
    client_max_body_size 1m;

    # Single-origin: proxy the backend at its OWN paths (note: no trailing slash on
    # proxy_pass, so /v1/... is forwarded unchanged — not rewritten). This makes the
    # SPA and the API same-origin, so the BFF session cookie is sent on API calls and
    # the path-scoped oidc_state cookie (/v1/auth/callback) lines up. The backend sets
    # its own security headers (incl. a strict API CSP) on these responses.
    location /v1/ {
        proxy_pass         http://app:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA fallback — always serve index.html for client-side routes.
    location / {
        # The document that loads and runs the app JS is the least-protected
        # response in the system unless we harden it here at the edge.
        #   - script/connect 'self': only our own bundle + same-origin /api.
        #   - style 'unsafe-inline': some libs inject inline <style>; styles are a
        #     far weaker XSS sink than scripts, which stay locked to 'self'.
        #   - frame-ancestors 'none' + base-uri 'none' + object-src 'none': block
        #     clickjacking, <base> hijacking, and legacy plugin vectors.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; base-uri 'none'; object-src 'none'; form-action 'self'; frame-ancestors 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        try_files $uri $uri/ /index.html;
    }
}
